<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallbox Status</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; text-align: center; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); margin: 20px auto; max-width: 320px; }
        h1 { font-size: 1.1em; color: #555; margin-bottom: 10px; }
        .value { font-size: 2.5em; font-weight: 800; color: #007bff; margin: 10px 0; }
        .unit { font-size: 1.2em; color: #888; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Wallbox Leistung</h1>
        <div id="power" class="value">Lädt...</div>
        <div class="unit">kW</div>
    </div>

    <script>
        // Deine Konfiguration
        const HA_URL = "https://1cbgsjyyusu6ydzrcy6uaqjcj5wrbyhw.ui.nabu.casa";
        const TOKEN = "HIER_DEIN_NEUES_TOKEN_EINFUEGEN";
        const ENTITY = "sensor.charger_power_active_import";

        async function updateData() {
            try {
                const response = await fetch(`${HA_URL}/api/states/${ENTITY}`, {
                    headers: { 
                        "Authorization": `Bearer ${TOKEN}`, 
                        "Content-Type": "application/json" 
                    }
                });
                
                if (!response.ok) throw new Error("API Fehler");
                
                const data = await response.json();
                
                // Anzeige aktualisieren
                if (data.state === 'unavailable' || data.state === 'unknown') {
                    document.getElementById('power').innerText = "0.0";
                } else {
                    document.getElementById('power').innerText = data.state;
                }
            } catch (error) {
                console.error("Fehler:", error);
                document.getElementById('power').innerText = "Fehler";
            }
        }

        // Alle 5 Sekunden abfragen
        setInterval(updateData, 5000);
        updateData();
    </script>
</body>
</html>
