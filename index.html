<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallbox Status</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #fff; --leap: #00d4ff; --mg: #ff4d4d; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 25px; border-radius: 30px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #333; }
        .value { font-size: 3rem; font-weight: 800; margin: 5px 0; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; border-top: 1px solid #333; padding-top: 15px; font-size: 0.75rem; color: #aaa; text-align: left; }
        .active-leap { color: var(--leap); }
        .active-mg { color: var(--mg); }
    </style>
</head>
<body>
    <div class="card">
        <div id="status">Lade Daten...</div>
        <div class="value"><span id="power">0.0</span> <small>kW</small></div>
        <div class="stats">
            <div>Leap (Monat):<br><b style="color:#fff"><span id="stat-leap-monat">0.0</span> kWh</b></div>
            <div>MG (Monat):<br><b style="color:#fff"><span id="stat-mg-monat">0.0</span> kWh</b></div>
            <div>Leap (Jahr):<br><b style="color:#fff"><span id="stat-leap-jahr">0.0</span> kWh</b></div>
        </div>
    </div>

    <script>
        const HA_URL = "https://1cbgsjyyusu6ydzrcy6uaqjcj5wrbyhw.ui.nabu.casa";
        const TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiI2MGFkM2VkMWRlZDY0OTRhODcwNGU5ZjA3NDM2MjkyZSIsImlhdCI6MTc4MTYwNDY2NCwiZXhwIjoyMDk2OTY0NjY0fQ.GkxU4wDagUDugKsEB8PsRGOh0NsCU-rPVuBFn4r4czk"; 

        async function updateData() {
            try {
                const response = await fetch(`${HA_URL}/api/states`, {
                    headers: { "Authorization": `Bearer ${TOKEN}`, "Content-Type": "application/json" }
                });
                const states = await response.json();
                
                const getVal = (id) => states.find(s => s.entity_id === id)?.state || "0";
                
                let rawPower = parseFloat(getVal("sensor.charger_power_active_import")) || 0;
                const power = (rawPower < 4.0) ? 0 : rawPower; 
                
                // Werte abrufen
                const leapMonat = getVal("sensor.leapmotor_monats_verbrauch");
                const mgMonat = getVal("sensor.mg_zs_monats_verbrauch");
                const leapJahr = getVal("sensor.leapmotor_jahres_verbrauch");

                // Anzeigen aktualisieren
                document.getElementById('power').innerText = power.toFixed(1);
                document.getElementById('stat-leap-monat').innerText = (leapMonat === "unknown" || leapMonat === "unavailable") ? "0.0" : parseFloat(leapMonat).toFixed(1);
                document.getElementById('stat-mg-monat').innerText = (mgMonat === "unknown" || mgMonat === "unavailable") ? "0.0" : parseFloat(mgMonat).toFixed(1);
                document.getElementById('stat-leap-jahr').innerText = (leapJahr === "unknown" || leapJahr === "unavailable") ? "0.0" : parseFloat(leapJahr).toFixed(1);

                const statusEl = document.getElementById('status');
                if (power > 7.0) { statusEl.innerText = "Lädt: Leapmotor C10"; statusEl.className = "active-leap"; }
                else if (power >= 4.0) { statusEl.innerText = "Lädt: MG ZS"; statusEl.className = "active-mg"; }
                else { statusEl.innerText = "Wallbox Standby"; statusEl.className = ""; }
            } catch (e) { console.error(e); }
        }

        setInterval(updateData, 5000);
        updateData();
    </script>
</body>
</html>
