<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallbox Control</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-dim: #b0b0b0;
            --leap-color: #00d4ff;
            --mg-color: #ff4d4d;
            --accent-dim: #333;
        }

        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container { width: 90%; max-width: 400px; }

        .card { 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            text-align: center;
            border: 1px solid #333;
        }

        .label { font-size: 0.9rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        
        .value-container { margin: 20px 0; }
        .value { font-size: 4rem; font-weight: 800; line-height: 1; }
        .unit { font-size: 1.2rem; color: var(--text-dim); margin-left: 5px; }

        .car-indicator {
            display: flex;
            justify-content: space-around;
            margin-top: 30px;
            gap: 10px;
        }

        .car-badge {
            flex: 1;
            padding: 12px 5px;
            border-radius: 15px;
            background: var(--accent-dim);
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--text-dim);
            transition: all 0.5s ease;
            border: 2px solid transparent;
        }

        /* Aktive Zustände für die Autos */
        .car-badge.active-leap { 
            background: rgba(0, 212, 255, 0.15); 
            color: var(--leap-color); 
            border-color: var(--leap-color);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        .car-badge.active-mg { 
            background: rgba(255, 77, 77, 0.15); 
            color: var(--mg-color); 
            border-color: var(--mg-color);
            box-shadow: 0 0 15px rgba(255, 77, 77, 0.3);
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: var(--accent-dim);
            border-radius: 3px;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--leap-color);
            transition: width 1s ease, background 1s ease;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <div id="status-label" class="label">Wallbox Standby</div>
            
            <div class="value-container">
                <span id="power" class="value">0.0</span>
                <span class="unit">kW</span>
            </div>

            <div class="progress-container">
                <div id="bar" class="progress-bar"></div>
            </div>

            <div class="car-indicator">
                <div id="badge-leap" class="car-badge">LEAPMOTOR C10</div>
                <div id="badge-mg" class="car-badge">MG ZS</div>
            </div>
        </div>
    </div>

    <script>
        const HA_URL = "https://1cbgsjyyusu6ydzrcy6uaqjcj5wrbyhw.ui.nabu.casa";
        const TOKEN = "DEIN_TOKEN_HIER"; // BITTE TOKEN EINSETZEN
        const ENTITY = "sensor.charger_power_active_import";

        async function updateData() {
            try {
                const response = await fetch(`${HA_URL}/api/states/${ENTITY}`, {
                    headers: { "Authorization": `Bearer ${TOKEN}`, "Content-Type": "application/json" }
                });
                const data = await response.json();
                let val = parseFloat(data.state);
                
                if (isNaN(val)) val = 0.0;

                // Anzeige aktualisieren
                document.getElementById('power').innerText = val.toFixed(1);

                const leapBadge = document.getElementById('badge-leap');
                const mgBadge = document.getElementById('badge-mg');
                const progressBar = document.getElementById('bar');
                const statusLabel = document.getElementById('status-label');

                // Logik für die Auto-Erkennung & Design
                if (val > 0.5) {
                    if (val > 7.0) {
                        // Leapmotor erkannt
                        statusLabel.innerText = "Lädt: Leapmotor C10";
                        leapBadge.className = "car-badge active-leap";
                        mgBadge.className = "car-badge";
                        progressBar.style.width = (val / 11 * 100) + "%";
                        progressBar.style.background = "var(--leap-color)";
                    } else {
                        // MG erkannt (oder Leapmotor drosselt)
                        statusLabel.innerText = "Lädt: MG ZS";
                        mgBadge.className = "car-badge active-mg";
                        leapBadge.className = "car-badge";
                        progressBar.style.width = (val / 6.2 * 100) + "%";
                        progressBar.style.background = "var(--mg-color)";
                    }
                } else {
                    // Standby
                    statusLabel.innerText = "Wallbox Standby";
                    leapBadge.className = "car-badge";
                    mgBadge.className = "car-badge";
                    progressBar.style.width = "0%";
                }

            } catch (error) {
                console.error(error);
                document.getElementById('power').innerText = "??";
            }
        }

        setInterval(updateData, 5000);
        updateData();
    </script>
</body>
</html>
